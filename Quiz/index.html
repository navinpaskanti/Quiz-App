<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="quiz-container bg-white p-4" id="quiz-container">
            <h2 class="text-center">Quiz App</h2>
            <p id="question" class="mt-3"></p>
            <div id="options" class="mb-3"></div>
            <button class="btn btn-secondary" onclick="prevQuestion()" id="prev-btn" disabled>Previous</button>
            <button class="btn btn-primary" onclick="nextQuestion()" id="next-btn" disabled>Next</button>
            <button class="btn btn-success d-none" onclick="submitQuiz()" id="submit-btn">Submit</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
